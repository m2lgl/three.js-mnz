<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Manzz V-Coder - Particle OS Full Web</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #status {
            position: absolute; top: 20px; left: 20px; color: #00ffff; z-index: 100;
            background: rgba(0, 20, 20, 0.8); padding: 12px; border-left: 4px solid #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); font-size: 12px; pointer-events: none;
        }
        #landscape-msg {
            display: none; position: fixed; inset: 0; background: #000; color: #0ff;
            z-index: 999; justify-content: center; align-items: center; text-align: center;
        }
        @media screen and (orientation: portrait) { #landscape-msg { display: flex; } }
        video { display: none; }
    </style>
</head>
<body>

    <div id="landscape-msg">🔄 MOHON MIRINGKAN HP (LANDSCAPE)</div>
    <div id="status">SISTEM: BOOTING V-CODER...</div>
    <video id="input_video" playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const videoElement = document.getElementById('input_video');
        const statusElement = document.getElementById('status');
        
        let currentMode = "spread";
        const CORE_COUNT = 5000; 
        const BG_COUNT = 2500;
        let time = 0;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const coreGeo = new THREE.BufferGeometry();
        const corePos = new Float32Array(CORE_COUNT * 3);
        const coreVelo = new Float32Array(CORE_COUNT * 3);
        const targets = {
            sphere: new Float32Array(CORE_COUNT * 3),
            heart_hole: new Float32Array(CORE_COUNT * 3),
            heart_full: new Float32Array(CORE_COUNT * 3),
            iloveyou: new Float32Array(CORE_COUNT * 3),
            bymanzz: new Float32Array(CORE_COUNT * 3),
            janji: new Float32Array(CORE_COUNT * 3),
            woi: new Float32Array(CORE_COUNT * 3),
            manis: new Float32Array(CORE_COUNT * 3),
            yoi: new Float32Array(CORE_COUNT * 3)
        };

        const bgGeo = new THREE.BufferGeometry();
        const bgPos = new Float32Array(BG_COUNT * 3);
        const bgOrbitData = [];

        function initSystems() {
            const globalScale = window.innerWidth < 800 ? 0.7 : 1.0;

            for (let i = 0; i < CORE_COUNT; i++) {
                corePos[i*3] = (Math.random()-0.5)*50;
                corePos[i*3+1] = (Math.random()-0.5)*50;
                corePos[i*3+2] = (Math.random()-0.5)*50;
                coreVelo[i*3] = (Math.random()-0.5)*0.25;
                coreVelo[i*3+1] = (Math.random()-0.5)*0.25;
                coreVelo[i*3+2] = (Math.random()-0.5)*0.25;

                const u = Math.random(), v = Math.random();
                const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
                const r = Math.cbrt(Math.random()) * (5 * globalScale);
                targets.sphere[i*3] = r * Math.sin(phi) * Math.cos(theta);
                targets.sphere[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                targets.sphere[i*3+2] = r * Math.cos(phi);
            }

            for (let i = 0; i < BG_COUNT; i++) {
                const r = 12 + Math.random() * 18;
                const angle = Math.random() * Math.PI * 2;
                bgPos[i*3] = Math.cos(angle) * r;
                bgPos[i*3+1] = (Math.random()-0.5) * 25;
                bgPos[i*3+2] = Math.sin(angle) * r;
                bgOrbitData.push({ radius: r, speed: 0.003 + Math.random() * 0.005, angle: angle });
            }

            const ts = 0.09 * globalScale;
            generateText("♡", targets.heart_hole, ts * 3.8); 
            generateText("❤️", targets.heart_full, ts * 3.8); 
            generateText("I LOVE YOU", targets.iloveyou, ts);
            generateText("BY MANZZ", targets.bymanzz, ts + 0.02);
            generateText("JANJI ?", targets.janji, ts + 0.02);
            generateText("PAK YU WKWK", targets.woi, ts - 0.01);
            generateText("MANIS BANGET", targets.manis, ts - 0.01);
            generateText("YOI CUY, JOSJIS", targets.yoi, ts + 0.02);
        }

        function generateText(text, targetArray, step) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1024; canvas.height = 256;
            ctx.fillStyle = 'white';
            ctx.font = 'bold 110px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 512, 128);
            const data = ctx.getImageData(0, 0, 1024, 256).data;
            const pts = [];
            for (let y = 0; y < 256; y+=4) {
                for (let x = 0; x < 1024; x+=4) {
                    if (data[(y * 1024 + x) * 4] > 128) pts.push({x: (x - 512) * step, y: (128 - y) * step});
                }
            }
            for (let i = 0; i < CORE_COUNT; i++) {
                const p = pts[i % pts.length] || {x:0, y:0};
                targetArray[i * 3] = p.x;
                targetArray[i * 3 + 1] = p.y;
                targetArray[i * 3 + 2] = (Math.random() - 0.5) * 1.5;
            }
        }

        initSystems();

        coreGeo.setAttribute('position', new THREE.BufferAttribute(corePos, 3));
        const coreMat = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.15, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
        const corePoints = new THREE.Points(coreGeo, coreMat);
        scene.add(corePoints);

        bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
        const bgMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
        const bgPoints = new THREE.Points(bgGeo, bgMat);
        scene.add(bgPoints);

        camera.position.z = 35;

        // --- HANDS ENGINE ---
        const hands = new window.Hands({ 
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` 
        });

        hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                const f = [8, 12, 16, 20].map(idx => lm[idx].y < lm[idx-2].y);
                const thumb = lm[4].x > lm[3].x;
                const count = f.filter(v => v).length + (thumb ? 1 : 0);

                if (count === 0) currentMode = "sphere";
                else if (f[3] && !f[0] && !f[1] && !f[2]) currentMode = "janji";
                else if (f[1] && !f[0] && !f[2] && !f[3]) currentMode = "woi";
                else if (f[2] && !f[0] && !f[1] && !f[3]) currentMode = "manis";
                else if (thumb && !f[0] && !f[1] && !f[2] && !f[3]) currentMode = "yoi";
                else if (count === 1) currentMode = "heart_hole"; 
                else if (count === 2) currentMode = "heart_full"; 
                else if (count === 3) currentMode = "iloveyou";
                else if (count === 4) currentMode = "bymanzz";
                else currentMode = "spread";

                statusElement.innerText = `MANZZ OS: ${currentMode.toUpperCase()}`;
            } else { statusElement.innerText = "MANZZ OS: MENCARI TANGAN..."; }
        });

        // --- WEB STARTUP ENGINE ---
        const cam = new window.Camera(videoElement, {
            onFrame: async () => {
                if (hands) await hands.send({ image: videoElement });
            },
            width: 640, height: 480
        });

        // Pastikan dijalankan saat Window benar-benar Load
        window.onload = () => {
            cam.start()
                .then(() => statusElement.innerText = "SISTEM: AKTIF & SCANNING")
                .catch(err => statusElement.innerText = "SISTEM: IZIN KAMERA DITOLAK");
        };

        function animate() {
            requestAnimationFrame(animate);
            time += 0.05;
            const corePosAttr = coreGeo.attributes.position;
            const bgPosAttr = bgGeo.attributes.position;
            const tData = targets[currentMode];

            if (currentMode === "spread") {
                corePoints.rotation.y += 0.005;
            } else {
                corePoints.rotation.y *= 0.9; 
            }

            for (let i = 0; i < CORE_COUNT; i++) {
                let i3 = i * 3;
                if (currentMode !== "spread") {
                    const wave = Math.sin(time + i * 0.1) * 0.08;
                    corePosAttr.array[i3] += (tData[i3] - corePosAttr.array[i3]) * 0.15 + wave;
                    corePosAttr.array[i3+1] += (tData[i3+1] - corePosAttr.array[i3+1]) * 0.15 + wave;
                    corePosAttr.array[i3+2] += (tData[i3+2] - corePosAttr.array[i3+2]) * 0.15 + wave;
                } else {
                    corePosAttr.array[i3] += coreVelo[i3];
                    corePosAttr.array[i3+1] += coreVelo[i3+1];
                    corePosAttr.array[i3+2] += coreVelo[i3+2];
                    if (Math.abs(corePosAttr.array[i3]) > 30) corePosAttr.array[i3] *= -0.8;
                }
            }

            for (let i = 0; i < BG_COUNT; i++) {
                let i3 = i * 3;
                bgOrbitData[i].angle += bgOrbitData[i].speed;
                bgPosAttr.array[i3] = Math.cos(bgOrbitData[i].angle) * bgOrbitData[i].radius;
                bgPosAttr.array[i3+2] = Math.sin(bgOrbitData[i].angle) * bgOrbitData[i].radius;
            }

            corePosAttr.needsUpdate = true;
            bgPosAttr.needsUpdate = true;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
