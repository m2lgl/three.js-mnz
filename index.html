<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Hand Sensor - Saturn Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #status {
            position: absolute; top: 20px; left: 20px; color: white;
            z-index: 10; pointer-events: none; text-shadow: 2px 2px 4px #000;
        }
        canvas { display: block; }
        video { transform: scaleX(-1); } /* Mirror video */
    </style>
</head>
<body>

    <div id="status">Menginisialisasi Kamera dan Sensor...</div>
    <video id="input_video" style="display:none"></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>

    <script>
        const videoElement = document.getElementById('input_video');
        const statusElement = document.getElementById('status');
        
        let isHandOpen = true;
        const PARTICLE_COUNT = 2000; // Mulai dari 50rb dulu agar lancar

        // --- 1. SETUP THREE.JS ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Inisialisasi Partikel
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const velocities = new Float32Array(PARTICLE_COUNT * 3);
        const targetPositions = new Float32Array(PARTICLE_COUNT * 3);

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            // Posisi Awal Acak
            positions[i * 3] = (Math.random() - 0.5) * 10;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 10;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 10;

            // Kecepatan Acak
            velocities[i * 3] = (Math.random() - 0.5) * 0.1;
            velocities[i * 3 + 1] = (Math.random() - 0.5) * 0.1;
            velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.1;

            // Target Saturnus (Cincin)
            const angle = Math.random() * Math.PI * 2;
            const radius = 3 + Math.random() * 2;
            targetPositions[i * 3] = Math.cos(angle) * radius;
            targetPositions[i * 3 + 1] = (Math.random() - 0.5) * 0.2; // Tipis vertikal
            targetPositions[i * 3 + 2] = Math.sin(angle) * radius;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({ color: 0x00ccff, size: 0.02, transparent: true });
        const points = new THREE.Points(geometry, material);
        scene.add(points);

        camera.position.z = 10;
        camera.position.y = 5;
        camera.lookAt(0,0,0);

        // --- 2. SETUP MEDIAPIPE ---
        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                
                // Logic sederhana: bandingkan tinggi telunjuk (8) dengan pangkalnya (6)
                // Y di MediaPipe terbalik (0 di atas, 1 di bawah)
                const indexFingerOpen = hand[8].y < hand[6].y;
                const middleFingerOpen = hand[12].y < hand[10].y;

                isHandOpen = indexFingerOpen || middleFingerOpen;
                statusElement.innerText = isHandOpen ? "STATUS: TANGAN TERBUKA (MENYEBAR)" : "STATUS: MENGEPAL (SATURNUS)";
                statusElement.style.color = isHandOpen ? "#00ff00" : "#ffcc00";
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });
        hands.onResults(onResults);

        const cam = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 640, height: 480
        });
        cam.start();

        // --- 3. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            const posAttr = geometry.attributes.position;
            
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;

                if (!isHandOpen) {
                    // MODE SATURNUS: Partikel lari ke targetPositions (Lerp)
                    posAttr.array[ix] += (targetPositions[ix] - posAttr.array[ix]) * 0.05;
                    posAttr.array[iy] += (targetPositions[iy] - posAttr.array[iy]) * 0.05;
                    posAttr.array[iz] += (targetPositions[iz] - posAttr.array[iz]) * 0.05;
                } else {
                    // MODE MENYEBAR: Partikel bergerak sesuai velocity
                    posAttr.array[ix] += velocities[ix];
                    posAttr.array[iy] += velocities[iy];
                    posAttr.array[iz] += velocities[iz];

                    // Reset jika terlalu jauh agar tidak hilang
                    if (Math.abs(posAttr.array[ix]) > 15) posAttr.array[ix] *= -0.1;
                }
            }

            posAttr.needsUpdate = true;
            points.rotation.y += 0.002; // Rotasi planet pelan-pelan
            renderer.render(scene, camera);
        }

        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
