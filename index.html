<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANZZ PARTICLE CONTROL ✌️</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; }
        canvas { display: block; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.5em; text-align: center; }
        #status { position: absolute; bottom: 20px; left: 20px; font-size: 1.2em; text-shadow: 0 0 5px #0ff; }
    </style>
</head>
<body>
    <div id="loading">Memuat Library & Font...<br>(Ini mungkin agak lama)</div>
    <div id="status">Status Tangan: Standby...</div>
    <video id="input_video" style="display:none;"></video>

    <script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.161.0/examples/js/loaders/FontLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.161.0/examples/js/geometries/TextGeometry.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const statusEl = document.getElementById('status');
        const loadingEl = document.getElementById('loading');
        let currentHandState = 'opened'; // opened, closed, peace, three, four
        let lerpFactor = 0.02; // Smooth transition speed

        // === 2. Setup Three.js (3D Scene) ===
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 25;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // === 3. Membuat Sistem Partikel (5000 titik) ===
        const particleCount = 5000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const targetPositions = new Float32Array(particleCount * 3); // Posisi tujuan (bentuk)
        const currentPositions = new Float32Array(particleCount * 3); // Posisi animasi saat ini

        // Posisi awal acak
        for (let i = 0; i < particleCount * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 50;
            currentPositions[i] = positions[i]; // Sinkronkan
            targetPositions[i] = positions[i]; // Sinkronkan
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));

        const material = new THREE.PointsMaterial({
            color: 0x00ffff,
            size: 0.15,
            transparent: true,
            blending: THREE.AddBlending,
            depthWrite: false
        });

        const points = new THREE.Points(geometry, material);
        scene.add(points);

        // === 4. Logika "Memahat" Bentuk (Shape Mathematics) ===
        let heartVertices = [];
        let iLoveYouVertices = [];
        let byManzzVertices = [];

        // --- A. Fungsi Rumus Hati 3D Sederhana ---
        function generateHeartShape() {
            let v = [];
            for (let i = 0; i < particleCount; i++) {
                const t = Math.random() * Math.PI * 2;
                // Rumus matematika bentuk hati 2D diproyeksikan ke 3D
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                const z = (Math.random() - 0.5) * 5; // Beri sedikit ketebalan
                v.push(new THREE.Vector3(x * 0.5, y * 0.5, z)); // Skala down
            }
            return v;
        }

        // --- B. Fungsi Membuat Bentuk Teks (Butuh Font JSON) ---
        function generateTextShape(font, text, size = 3) {
            const textGeo = new THREE.TextGeometry(text, { font: font, size: size, height: 0.5 });
            textGeo.computeBoundingBox();
            textGeo.center(); // Tengahkan teks

            // Ambil vertex dari geometri teks asli
            const textPoints = [];
            const textPos = textGeo.attributes.position.array;
            for(let i=0; i<textPos.length; i+=3) {
                textPoints.push(new THREE.Vector3(textPos[i], textPos[i+1], textPos[i+2]));
            }

            // Sampler: Distribusikan partikel kita ke posisi teks tersebut
            const v = [];
            for(let i=0; i<particleCount; i++) {
                v.push(textPoints[i % textPoints.length].clone());
            }
            return v;
        }

        // === 5. Load Font & Generate Bentuk ===
        const fontLoader = new THREE.FontLoader();
        // Pakai Font JSON minimalis dari CDN agar full JS
        fontLoader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@dev/examples/fonts/helvetiker_regular.typeface.json', (font) => {
            console.log('Font Loaded!');
            heartVertices = generateHeartShape();
            iLoveYouVertices = generateTextShape(font, 'I LOVE YOU', 2.5);
            byManzzVertices = generateTextShape(font, 'BY MANZZ', 3);
            
            loadingEl.style.display = 'none'; // Sembunyikan loading
            startCamera(); // Mulai kamera setelah semua siap
        });

        // === 6. Setup MediaPipe Hands ===
        const videoElement = document.getElementById('input_video');

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0]; // Ambil tangan pertama
                detectGesture(landmarks);
            } else {
                currentHandState = 'none';
                statusEl.innerText = 'Status Tangan: Tidak terdeteksi';
            }
        }

        // --- Logika Deteksi Jari (Gesture) ---
        function detectGesture(lm) {
            // Logika sederhana: Cek apakah ujung jari (8, 12, 16, 20) di atas sendi (6, 10, 14, 18)
            const indexOpen = lm[8].y < lm[6].y;
            const middleOpen = lm[12].y < lm[10].y;
            const ringOpen = lm[16].y < lm[14].y;
            const pinkyOpen = lm[20].y < lm[18].y;
            const thumbOpen = lm[4].x < lm[2].x; // Jempol agak beda (cek sumbu x)

            // Hitung jari yang terbuka (kecuali jempol biar gampang)
            const openFingers = [indexOpen, middleOpen, ringOpen, pinkyOpen].filter(v => v).length;

            if (openFingers === 0) {
                currentHandState = 'closed'; // Kepalan
                statusEl.innerText = 'Status Tangan: MENYUSUT (Tertutup)';
            } else if (openFingers === 2 && indexOpen && middleOpen) {
                currentHandState = 'peace'; // Simbol Peace ✌️
                statusEl.innerText = 'Status Tangan: HATI (Peace ✌️)';
            } else if (openFingers === 3 && indexOpen && middleOpen && ringOpen) {
                currentHandState = 'three'; // 3 Jari
                statusEl.innerText = 'Status Tangan: I LOVE YOU (3 Jari)';
            } else if (openFingers === 4) {
                currentHandState = 'four'; // 4 Jari
                statusEl.innerText = 'Status Tangan: BY MANZZ (4 Jari)';
            } else if (openFingers >= 4 || (thumbOpen && indexOpen)) {
                currentHandState = 'opened'; // Terbuka penuh
                statusEl.innerText = 'Status Tangan: MENYEBAR (Terbuka)';
            }
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(onResults);

        function startCamera() {
            const cameraMp = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });
            cameraMp.start();
        }

        // === 7. Animation Loop (Update Partikel & Animasi) ===
        function animate() {
            requestAnimationFrame(animate);

            // Update target positions berdasarkan state tangan saat ini
            let currentTarget = null;
            if (currentHandState === 'peace') currentTarget = heartVertices;
            else if (currentHandState === 'three') currentTarget = iLoveYouVertices;
            else if (currentHandState === 'four') currentTarget = byManzzVertices;

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                let tx, ty, tz;

                if (currentTarget) {
                    // Jika ada bentuk (hati/teks), target posisinya adalah bentuk tersebut
                    tx = currentTarget[i].x;
                    ty = currentTarget[i].y;
                    tz = currentTarget[i].z;
                } else if (currentHandState === 'closed') {
                    // Menyusut: Target posisi adalah tengah (0,0,0)
                    tx = 0; ty = 0; tz = 0;
                } else {
                    // Menyebar (Opened/None): Target posisi adalah posisi acak awal (paling menyebar)
                    tx = positions[i3];
                    ty = positions[i3 + 1];
                    tz = positions[i3 + 2];
                }

                // Smooth animation (Lerp current towards target)
                currentPositions[i3] = THREE.MathUtils.lerp(currentPositions[i3], tx, lerpFactor);
                currentPositions[i3 + 1] = THREE.MathUtils.lerp(currentPositions[i3 + 1], ty, lerpFactor);
                currentPositions[i3 + 2] = THREE.MathUtils.lerp(currentPositions[i3 + 2], tz, lerpFactor);
            }

            geometry.attributes.position.needsUpdate = true; // Beri tahu GPU kalau posisi berubah
            
            // Beri sedikit rotasi otomatis biar efek 3D-nya kelihatan
            points.rotation.y += 0.001; 
            if (currentHandState === 'peace') points.rotation.y += 0.005; // Hati muter lebih cepet

            renderer.render(scene, camera);
        }

        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
